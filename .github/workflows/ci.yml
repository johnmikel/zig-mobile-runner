name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: |
          brew install zig kcov
          gem install xcodeproj
      - name: Local release gate
        run: ./scripts/release-gate.sh
