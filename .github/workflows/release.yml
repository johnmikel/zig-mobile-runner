name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: macos-15
    timeout-minutes: 45
    env:
      ZIG_VERSION: "0.15.2"
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: clients/go/go.mod
      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustc --version
          cargo --version
      - name: Install tools
        run: |
          brew install kcov
          gem install xcodeproj
          case "$(uname -m)" in
            arm64) zig_arch="aarch64" ;;
            x86_64) zig_arch="x86_64" ;;
            *) echo "unsupported macOS architecture: $(uname -m)" >&2; exit 1 ;;
          esac
          curl -L -o zig.tar.xz "https://ziglang.org/download/${ZIG_VERSION}/zig-${zig_arch}-macos-${ZIG_VERSION}.tar.xz"
          tar -xf zig.tar.xz
          echo "$PWD/zig-${zig_arch}-macos-${ZIG_VERSION}" >> "$GITHUB_PATH"
          "$PWD/zig-${zig_arch}-macos-${ZIG_VERSION}/zig" version
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Local release gate
        run: |
          ZMR_VERSION="${GITHUB_REF_NAME#v}" \
          ZMR_RELEASE_BASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}" \
          ./scripts/release-gate.sh
      - name: Build npm package
        run: |
          npm version --no-git-tag-version --allow-same-version "${GITHUB_REF_NAME#v}"
          ZMR_VERSION="${GITHUB_REF_NAME#v}" npm run pack:npm
      - name: Attest release artifacts
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/*.tar.gz
            dist/zig-mobile-runner-*.tgz
            dist/SBOM.spdx.json
            dist/THIRD_PARTY_NOTICES.md
            dist/RELEASE_MANIFEST.json
            dist/homebrew/zmr.rb
            dist/SHA256SUMS
      - name: Upload GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/zig-mobile-runner-*.tgz
            dist/SBOM.spdx.json
            dist/THIRD_PARTY_NOTICES.md
            dist/RELEASE_MANIFEST.json
            dist/homebrew/zmr.rb
            dist/SHA256SUMS
      - name: Publish npm package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN not set; skipping npm publish"
            exit 0
          fi
          npm publish dist/zig-mobile-runner-*.tgz --provenance --access public
